<head>

    <title> Candy Kiss — Links</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            position: relative;
            overflow-x: hidden;
        }

        /* ====== FONDO ANIMADO ====== */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(190, 40, 100, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(120, 40, 200, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 50, 80, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a0a 0%, #0d0d1a 50%, #0a0a0a 100%);
        }

        .bg-gradient::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
        }

        /* ====== PARTÍCULAS ====== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        .particle.circle {
            background: radial-gradient(circle, rgba(255, 100, 150, 0.6), transparent);
        }

        .particle.dot {
            background: rgba(255, 255, 255, 0.5);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            85% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ====== ORBE BRILLANTE ====== */
        .glow-orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: orbMove 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        .glow-orb.one {
            background: #ff2d75;
            top: 20%;
            left: -5%;
        }

        .glow-orb.two {
            background: #8b5cf6;
            bottom: 10%;
            right: -5%;
            animation-delay: -4s;
        }

        @keyframes orbMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -30px) scale(1.2); }
        }

        /* ====== CONTENEDOR PRINCIPAL ====== */
        .container {
            text-align: center;
            padding: 50px 24px;
            max-width: 440px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        /* ====== AVATAR ====== */
        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .avatar-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #ff2d75, #8b5cf6);
            border-radius: 50%;
            filter: blur(25px);
            opacity: 0.5;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        .avatar-ring {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, #ff2d75, #ff6b9d, #c084fc, #8b5cf6);
            background-size: 300% 300%;
            animation: gradientSpin 4s ease infinite;
        }

        @keyframes gradientSpin {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .avatar-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0a0a0a;
        }

        .verified-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #ff2d75, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 3px solid #0a0a0a;
            z-index: 3;
        }

        .online-pulse {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 16px;
            height: 16px;
            background: #00ff88;
            border-radius: 50%;
            border: 3px solid #0a0a0a;
            z-index: 3;
        }

        .online-pulse::after {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            width: 16px;
            height: 16px;
            background: #00ff88;
            border-radius: 50%;
            animation: onlinePing 2s ease-in-out infinite;
        }

        @keyframes onlinePing {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.8); opacity: 0; }
        }

        /* ====== NOMBRE ====== */
        .name {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .name span {
            background: linear-gradient(135deg, #ff6b9d, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ====== BIO ====== */
        .bio {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            font-weight: 300;
            line-height: 1.6;
        }

        .bio-tagline {
            display: inline-block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 32px;
            padding: 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.03);
        }

        /* ====== CONTADOR ====== */
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 32px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ====== BOTONES ====== */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 24px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: none;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.6s ease;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            transform: translateY(-4px) scale(1.02);
        }

        .link-btn:active {
            transform: translateY(-1px) scale(0.99);
        }

        .link-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .link-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex-grow: 1;
        }

        .link-title {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .link-subtitle {
            font-size: 11px;
            opacity: 0.7;
            font-weight: 400;
            color: rgba(255,255,255,0.7);
        }

        .link-arrow {
            font-size: 18px;
            opacity: 0.5;
            transition: all 0.3s;
            color: #fff;
        }

        .link-btn:hover .link-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

            border: 1px solid rgba(255, 255, 255, 0.1);

        }
        .tiktok:hover {

        }

        /* ====== 18+ BADGE ====== */
        .age-badge {

            font-size: 11px;

        }

        /* ====== FOOTER ====== */
        .footer {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
        }

        /* ====== ANIMACIONES DE ENTRADA ====== */
        .container > * {
            opacity: 0;
            animation: fadeSlideIn 0.6s ease forwards;
        }

        .container > *:nth-child(1) { animation-delay: 0s; }
        .container > *:nth-child(2) { animation-delay: 0.1s; }
        .container > *:nth-child(3) { animation-delay: 0.15s; }
        .container > *:nth-child(4) { animation-delay: 0.2s; }
        .container > *:nth-child(5) { animation-delay: 0.25s; }
        .container > *:nth-child(6) { animation-delay: 0.3s; }
        .container > *:nth-child(7) { animation-delay: 0.35s; }
        .container > *:nth-child(8) { animation-delay: 0.4s; }

        .link-btn {
            opacity: 0;
            animation: fadeSlideIn 0.5s ease forwards;
        }
        .links .link-btn:nth-child(1) { animation-delay: 0.3s; }
        .links .link-btn:nth-child(2) { animation-delay: 0.4s; }
        .links .link-btn:nth-child(3) { animation-delay: 0.5s; }
        .links .link-btn:nth-child(4) { animation-delay: 0.6s; }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 380px) {
            .name { font-size: 26px; }
            .link-btn { padding: 14px 18px; }
            .stats { gap: 20px; }
        }
    </style>
</head>
